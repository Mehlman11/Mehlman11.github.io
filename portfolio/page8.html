<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Ehlman</title>

    <link rel="stylesheet" href="style/style2.css">
    <link rel="stylesheet" href="https://use.typekit.net/ddv5jox.css">
</head>

<body>
<main>

    <section id="works8" class="contact-page">

        <!-- Name -->
        <h1 class="name">Michael Ehlman</h1>

        <!-- Menu -->
        <nav class="hamburger-menu">
            <input type="checkbox" id="menu-toggle">

            <label for="menu-toggle" class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <div class="menu-links">
                <a href="port.html">Main</a>
                <a href="page2.html">My Works</a>
                <a href="page8.html">Contact</a>
                <a href="page7.html">Bio</a>
            </div>
        </nav>

        <!-- CONTACT circles -->
        <div class="welcome2">
            <div class="circle">C</div>
            <div class="circle">O</div>
            <div class="circle">N</div>
            <div class="circle">T</div>
            <div class="circle">A</div>
            <div class="circle">C</div>
            <div class="circle">T</div>
        </div>

        <!-- Form -->
        <div class="main">

            <form
                action="https://www.form-to-email.com/api/s/eA2zHSd2O7_a"
                method="POST"
                enctype="multipart/form-data"
            >

                <label for="fullName">Full Name:</label>
                <input
                    type="text"
                    id="fullName"
                    name="name"
                    placeholder="Name and Surname"
                    required
                >

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject">

                <label for="email">Email:</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email Address"
                    required
                >

                <span>Are You in the US?</span>
                <div>
                    <input type="radio" name="location" id="yes" value="Yes" checked>
                    <label for="yes">Yes</label>

                    <input type="radio" name="location" id="no" value="No">
                    <label for="no">No</label>
                </div>

                <label for="message">Message:</label>
                <textarea
                    id="message"
                    name="message"
                    rows="10"
                    placeholder="Your message here..."
                    required
                ></textarea>

                <select id="Occupation" name="Occupation">
                    <option value="student">Student</option>
                    <option value="business owner">Business Owner</option>
                    <option value="designer" selected>Designer</option>
                    <option value="something else">Something Else</option>
                </select>

                <div class="consent-row">
                    <input
                        type="checkbox"
                        id="consent"
                        name="consent"
                        value="yes"
                        required
                    >
                    <label for="consent">
                        I consent to receive communications from you.
                    </label>
                </div>

                <button type="submit">Submit</button>
                <button type="reset">Reset</button>

            </form>

        </div>

    </section>

</main>
</body>
</html>
